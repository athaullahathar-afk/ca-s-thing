<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 Special Chat</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="loading-screen" id="loading">
                <div class="kawaii-loader">
                    <div class="face">
                        <div class="eye left"></div>
                        <div class="eye right"></div>
                        <div class="mouth"></div>
                    </div>
                    <p class="loading-text">Getting ready~</p>
                </div>
            </div>

            <div class="main-content" id="mainContent">
                <div class="avatar-wrapper">
                    <div class="avatar">
                        <div class="ears">
                            <div class="ear left"></div>
                            <div class="ear right"></div>
                        </div>
                        <i class="fas fa-user-circle"></i>
                        <div class="blush left"></div>
                        <div class="blush right"></div>
                    </div>
                </div>

                <div class="header">
                    <h1 class="title typewrite" data-text="Hey cutie!">
                        <span class="cursor">|</span>
                    </h1>
                    <p class="subtitle">Quick Google Meet? 🐾<br>Pick your fave time!</p>
                </div>

                <div class="date-grid" id="dateGrid">
                    <!-- Dates will load here -->
                </div>

                <div class="confirm-section" id="confirmSection">
                    <button class="confirm-btn" id="confirmBtn" style="display: none;">
                        <i class="fas fa-magic"></i>
                        Chat now! ✨
                    </button>
                </div>

                <div class="paw-prints">
                    <div class="paw paw1">🐾</div>
                    <div class="paw paw2">🐾</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
